
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { font-family: var(--font-sans); padding: 2px; }

.section-label {
  font-size: 11px; font-weight: 500; color: var(--color-text-secondary);
  letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 14px;
}

.emotion-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.emotion-item {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 14px 8px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  cursor: pointer;
  transition: border-color 0.12s;
}
.emotion-item:hover { border-color: var(--color-border-secondary); }

.emotion-label {
  font-size: 12px; font-weight: 500; color: var(--color-text-primary); text-align: center;
}
.emotion-sub {
  font-size: 10px; color: var(--color-text-secondary); text-align: center;
}

.divider {
  border: none; border-top: 0.5px solid var(--color-border-tertiary);
  margin-bottom: 24px;
}

.card-row {
  display: flex; gap: 10px; flex-wrap: wrap;
}

.jcard {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 14px;
  flex: 1; min-width: 180px; max-width: 240px;
}

.jcard-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.jcard-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.jcard-phase { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }

.jcard-preview {
  font-size: 12px; color: var(--color-text-secondary); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 10px;
}
.jcard-preview em { font-style: normal; color: var(--color-text-primary); }

.jcard-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary);
}
.foot-time { font-size: 11px; color: var(--color-text-tertiary); }
.foot-emotion {
  font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px;
}
</style>

<div class="wrap">
  <div class="section-label">感情アイコンの探索</div>
  <div class="emotion-grid" id="emotionGrid"></div>

  <hr class="divider">

  <div class="section-label">カードに宿った状態</div>
  <div class="card-row" id="cardRow"></div>
</div>

<script>
const emotions = [
  {
    id: 'wakuwaku', label: 'ワクワク', sub: '興味が湧いてる',
    fill: '#FAEEDA', stroke: '#EF9F27', text: '#854F0B',
    footBg: '#FAEEDA', footText: '#854F0B',
    path: 'M50,12 C68,10 88,22 90,40 C93,58 82,75 68,82 C54,90 32,90 20,78 C8,66 7,46 16,30 C24,15 32,14 50,12 Z'
  },
  {
    id: 'sukkiri', label: 'すっきり', sub: '整理できた',
    fill: '#E1F5EE', stroke: '#1D9E75', text: '#0F6E56',
    footBg: '#E1F5EE', footText: '#0F6E56',
    path: 'M50,10 C65,8 82,20 86,38 C90,55 80,74 64,82 C48,90 28,86 16,72 C4,58 6,36 18,22 C28,10 36,12 50,10 Z'
  },
  {
    id: 'moyamoya', label: 'モヤモヤ', sub: 'まだ見えない',
    fill: '#EEEDFE', stroke: '#7F77DD', text: '#534AB7',
    footBg: '#EEEDFE', footText: '#534AB7',
    path: 'M48,14 C62,8 84,18 88,36 C92,52 80,72 64,82 C48,90 26,88 14,74 C2,60 6,38 18,24 C28,12 36,18 48,14 Z'
  },
  {
    id: 'fuan', label: '不安', sub: '進めるか心配',
    fill: '#E6F1FB', stroke: '#378ADD', text: '#185FA5',
    footBg: '#E6F1FB', footText: '#185FA5',
    path: 'M50,16 C66,10 86,24 88,42 C90,58 78,76 62,84 C46,92 24,88 14,74 C4,60 8,38 20,26 C30,14 36,20 50,16 Z'
  },
  {
    id: 'ikizumari', label: '行き詰まり', sub: '動けない',
    fill: '#FCEBEB', stroke: '#E24B4A', text: '#A32D2D',
    footBg: '#FCEBEB', footText: '#A32D2D',
    path: 'M50,18 C64,14 80,26 84,44 C88,60 76,76 60,84 C44,92 24,86 14,70 C4,54 10,34 24,22 C34,12 38,22 50,18 Z'
  },
  {
    id: 'omoshiroi', label: 'おもしろい', sub: '発見がある',
    fill: '#EAF3DE', stroke: '#639922', text: '#3B6D11',
    footBg: '#EAF3DE', footText: '#3B6D11',
    path: 'M50,10 C66,6 86,16 90,34 C94,52 82,72 64,82 C46,92 24,90 12,76 C0,62 4,38 16,24 C26,10 34,14 50,10 Z'
  },
  {
    id: 'muzukashii', label: 'むずかしい', sub: '考えてる途中',
    fill: '#FBEAF0', stroke: '#D4537E', text: '#993556',
    footBg: '#FBEAF0', footText: '#993556',
    path: 'M50,14 C64,10 82,22 86,40 C90,56 80,74 64,84 C48,92 28,88 16,74 C4,60 6,40 16,26 C26,12 36,18 50,14 Z'
  },
  {
    id: 'tanoshii', label: 'たのしい', sub: 'のってる',
    fill: '#FAECE7', stroke: '#D85A30', text: '#993C1D',
    footBg: '#FAECE7', footText: '#993C1D',
    path: 'M50,8 C68,4 90,18 92,38 C94,56 80,76 62,84 C44,92 22,90 10,76 C-2,62 2,38 14,22 C24,8 34,12 50,8 Z'
  },
];

function makeBlobSVG(e, size) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="${e.path}" fill="${e.fill}" stroke="${e.stroke}" stroke-width="2"/>
    <text x="50" y="56" text-anchor="middle" font-size="28" font-family="sans-serif" fill="${e.text}" font-weight="500">${e.label[0]}</text>
  </svg>`;
}

const grid = document.getElementById('emotionGrid');
emotions.forEach(e => {
  const item = document.createElement('div');
  item.className = 'emotion-item';
  item.innerHTML = `
    ${makeBlobSVG(e, 64)}
    <div class="emotion-label">${e.label}</div>
    <div class="emotion-sub">${e.sub}</div>
  `;
  grid.appendChild(item);
});

const cards = [
  { name: '佐藤 葵', phase: '深い探究', emo: emotions[0], time: '今日', preview: '今日の対話で、UNHCRの報告書を読み込み「<em>インターネット接続の問題だけでなく、使う動機の構造が問題だ</em>」という気づきを自分の言葉で語っていました。' },
  { name: '中村 結衣', phase: '立ち止まり中', emo: emotions[4], time: '5日前', preview: '5日間、対話ログが途絶えています。前回の会話では「<em>何を調べればいいかわからない</em>」という言葉が残っており…' },
  { name: '山田 涼', phase: '内面化中', emo: emotions[2], time: '2日前', preview: '前回の対話で、地元のアーケード商店街を取材したいという具体的なイメージが出てきました。問いが「<em>自分ごと</em>」になっている手応えがあります。' },
];

const cardRow = document.getElementById('cardRow');
cards.forEach(c => {
  const el = document.createElement('div');
  el.className = 'jcard';
  el.innerHTML = `
    <div class="jcard-head">
      ${makeBlobSVG(c.emo, 40)}
      <div>
        <div class="jcard-name">${c.name}</div>
        <div class="jcard-phase">${c.phase}</div>
      </div>
    </div>
    <div class="jcard-preview">${c.preview}</div>
    <div class="jcard-foot">
      <span class="foot-time">${c.time}</span>
      <span class="foot-emotion" style="background:${c.emo.footBg};color:${c.emo.footText};">${c.emo.label}</span>
    </div>
  `;
  cardRow.appendChild(el);
});
</script>
