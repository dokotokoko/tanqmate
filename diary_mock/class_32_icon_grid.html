
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { font-family: var(--font-sans); padding: 2px; }
.header { display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 12px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 18px; }
.class-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.header-sub { font-size: 12px; color: var(--color-text-secondary); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.jcard {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.12s;
}
.jcard:hover { border-color: var(--color-border-secondary); }
.jcard-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.jcard-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
.jcard-num { font-size: 10px; color: var(--color-text-secondary); margin-top: 1px; }
.jcard-preview {
  font-size: 11px; color: var(--color-text-secondary); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.jcard-preview em { font-style: normal; color: var(--color-text-primary); }
</style>

var svgNS = 'http://www.w3.org/2000/svg';
var grid = document.getElementById('grid');

students.forEach(function(s, i) {
  var e = emos[s.emo];
  var card = document.createElement('div');
  card.className = 'jcard';

  var iconSVG = '<svg width="36" height="36" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" id="ico-' + i + '" style="flex-shrink:0;">'
    + '<path id="icp-' + i + '" d="' + e.p0 + '" fill="' + e.fill + '" stroke="' + e.stroke + '" stroke-width="2"/>'
    + '<text x="50" y="56" text-anchor="middle" font-size="38" font-family="sans-serif" fill="' + e.text + '" font-weight="500">' + s.name[0] + '</text>'
    + '</svg>';

  card.innerHTML = '<div class="jcard-head">'
    + iconSVG
    + '<div><div class="jcard-name">' + s.name + '</div><div class="jcard-num">' + s.num + '</div></div>'
    + '</div>'
    + '<div class="jcard-preview">' + s.preview + '</div>';

  grid.appendChild(card);
});

setTimeout(function() {
  students.forEach(function(s, i) {
    var e = emos[s.emo];
    var path = document.getElementById('icp-' + i);
    if (path) {
      gsap.to(path, {
        duration: e.dur, repeat: -1, yoyo: true, ease: 'sine.inOut',
        attr: { d: e.p1 }, delay: (i * 0.13) % e.dur
      });
    }
    var ico = document.getElementById('ico-' + i);
    if (ico) {
      gsap.fromTo(ico,
        { scale: e.s0, transformOrigin: '50% 50%' },
        { scale: e.s1, transformOrigin: '50% 50%',
          duration: e.dur, repeat: -1, yoyo: true, ease: 'sine.inOut',
          delay: (i * 0.13) % e.dur }
      );
    }
  });
}, 200);
